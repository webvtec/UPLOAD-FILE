<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Files</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    p.sub {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 28px;
    }

    .drop-zone {
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #555;
      background: #222;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon { font-size: 2rem; margin-bottom: 10px; }

    .drop-zone span {
      display: block;
      font-size: 0.9rem;
      color: #888;
    }

    .drop-zone strong {
      color: #ddd;
    }

    #file-list {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-item {
      background: #222;
      border: 1px solid #2e2e2e;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.82rem;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .file-item .name {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #ccc;
      gap: 8px;
    }

    .file-item .name span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-item .name .size {
      color: #555;
      white-space: nowrap;
      font-size: 0.78rem;
    }

    .progress-bar {
      height: 3px;
      background: #2e2e2e;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #4ade80;
      width: 0%;
      transition: width 0.2s;
    }

    .status {
      font-size: 0.75rem;
      color: #555;
    }

    .status.done { color: #4ade80; }
    .status.error { color: #f87171; }

    button#upload-btn {
      margin-top: 22px;
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #0f0f0f;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button#upload-btn:hover { background: #ddd; }
    button#upload-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="card">
  <h1>Upload Files</h1>
  <p class="sub">Select or drop any files — everyone can upload.</p>

  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" multiple />
    <div class="drop-icon">📂</div>
    <span><strong>Click to select</strong> or drag files here</span>
    <span style="margin-top:4px; font-size:0.78rem;">Multiple files supported</span>
  </div>

  <div id="file-list"></div>

  <button id="upload-btn" disabled>Upload</button>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getStorage, ref, uploadBytesResumable } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

  // 🔧 REPLACE WITH YOUR FIREBASE CONFIG
 const firebaseConfig = {
  apiKey: "AIzaSyB-Ju8WQVdTqxGAHB_JBoC2kgZ3i2GOpxM",
  authDomain: "travis-the-barber.firebaseapp.com",
  projectId: "travis-the-barber",
  storageBucket: "travis-the-barber.firebasestorage.app",
  messagingSenderId: "713818270570",
  appId: "1:713818270570:web:fe627ace00c4a3112ed313"
};
  const app = initializeApp(firebaseConfig);
  const storage = getStorage(app);

  const fileInput = document.getElementById("file-input");
  const dropZone = document.getElementById("drop-zone");
  const fileList = document.getElementById("file-list");
  const uploadBtn = document.getElementById("upload-btn");

  let selectedFiles = [];

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / (1024 * 1024)).toFixed(1) + " MB";
  }

  function renderFiles() {
    fileList.innerHTML = "";
    selectedFiles.forEach((file, i) => {
      const item = document.createElement("div");
      item.className = "file-item";
      item.id = `file-${i}`;
      item.innerHTML = `
        <div class="name">
          <span>${file.name}</span>
          <span class="size">${formatSize(file.size)}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="prog-${i}"></div></div>
        <div class="status" id="status-${i}">Ready</div>
      `;
      fileList.appendChild(item);
    });
    uploadBtn.disabled = selectedFiles.length === 0;
  }

  fileInput.addEventListener("change", () => {
    selectedFiles = Array.from(fileInput.files);
    renderFiles();
  });

  dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("drag-over"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
  dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("drag-over");
    selectedFiles = Array.from(e.dataTransfer.files);
    renderFiles();
  });

  uploadBtn.addEventListener("click", () => {
    if (!selectedFiles.length) return;
    uploadBtn.disabled = true;

    selectedFiles.forEach((file, i) => {
      const storageRef = ref(storage, `uploads/${Date.now()}_${file.name}`);
      const task = uploadBytesResumable(storageRef, file);
      const prog = document.getElementById(`prog-${i}`);
      const status = document.getElementById(`status-${i}`);

      task.on("state_changed",
        (snap) => {
          const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
          prog.style.width = pct + "%";
          status.textContent = `${pct}%`;
        },
        (err) => {
          status.textContent = "Failed: " + err.message;
          status.className = "status error";
        },
        () => {
          prog.style.width = "100%";
          status.textContent = "Done ✓";
          status.className = "status done";
        }
      );
    });
  });
</script>
</body>
</html>
